version: 0.1
status: draft
repository:
  name: template
  summary: >-
    Vendor-agnostic Harness Kernel foundation for coding-agent workflows across
    multiple development domains.
  phase: foundation

source_of_truth:
  workflow:
    - DESIGN.md
    - harness/manifest.yaml
    - harness/capability-profile.yaml
    - harness/context-index.yaml
    - harness/policy.yaml
    - harness/review.yaml
    - harness/rules.yaml
    - harness/oracles.yaml
    - harness/compatibility-matrix.yaml
  projections:
    summary: Projection specs are kernel-owned source artifacts; generated vendor files are not.
    items:
      - harness/projections/README.md
      - harness/projections/openai-agents.yaml
      - harness/projections/anthropic-claude.yaml

current_scope:
  includes:
    - Kernel vocabulary
    - Partial vendor compatibility matrix
    - Context and review scaffolding
    - Policy, rule, and oracle scaffolding
    - Initial projection contracts for OpenAI AGENTS.md and Anthropic CLAUDE.md
  excludes:
    - Runtime wrapper implementation
    - Hook executables and CI wiring

defaults:
  profile: harness/capability-profile.yaml
  first_projection: harness/projections/openai-agents.yaml
  shared_leaf_adapter: AGENTS.md
  baseline_oracle_pack: core

rollout:
  current_step: foundation-docs-and-scaffolding
  next_steps:
    - Expand compatibility matrix coverage carefully.
    - Keep generated leaf adapters aligned with their projection specs.
    - Use symlinked adapters only where source-of-truth boundaries stay clear.
    - Introduce runtime helpers only after a documented gap is demonstrated.
