version: 0.1
status: draft
repository:
  name: template
  summary: >-
    Reusable development template with a vendor-agnostic Harness Kernel for
    adapting coding-agent workflows to future project domains and stacks.
  phase: foundation

source_of_truth:
  workflow:
    - DESIGN.md
    - docs/adr/
    - harness/manifest.yaml
    - harness/capability-profile.yaml
    - harness/context-index.yaml
    - harness/policy.yaml
    - harness/review.yaml
    - harness/rules.yaml
    - harness/oracles.yaml
    - harness/compatibility-matrix.yaml
  projections:
    summary: Projection specs are kernel-owned source artifacts; generated vendor files are not.
    items:
      - harness/projections/README.md
      - harness/projections/openai-agents.yaml
      - harness/projections/anthropic-claude.yaml

current_scope:
  includes:
    - Template-level project intake framing
    - ADR scaffolding
    - Kernel vocabulary
    - Partial vendor compatibility matrix
    - Context and review scaffolding
    - Policy, rule, and oracle scaffolding
    - Project-specific code quality readiness checks
    - Initial projection contracts for OpenAI AGENTS.md and Anthropic CLAUDE.md
  excludes:
    - Runtime wrapper implementation
    - Hook executables and CI wiring

defaults:
  profile: harness/capability-profile.yaml
  first_projection: harness/projections/openai-agents.yaml
  shared_leaf_adapter: AGENTS.md
  baseline_oracle_pack: core

specialization_record:
  summary: >-
    Committed home for project intake, stack selection, and template-level
    specialization decisions.
  decision_log_boundary: >-
    Use this section for current specialization state. Use `docs/adr/` for durable
    architectural and policy decisions when ADR triggers apply.
  example_ref: harness/examples/manifest-specialization.example.yaml
  intake:
    status: pending
    target_project:
      name: TBD
      summary: TBD
      domain: TBD
      users: []
      constraints: []
      integrations: []
      delivery_shape: TBD
  research:
    status: pending
    questions: []
    findings: []
    sources: []
    notes: []
  stack_selection:
    status: pending
    decision: TBD
    rationale: TBD
    selected:
      runtime: TBD
      framework: TBD
      data_layer: TBD
      deployment_target: TBD
      tooling: []
    alternatives_considered: []
    notes: []
    harness_artifacts:
      oracle_packs_activated: []
      capability_activations: []
      projections_required: []
  harness_application:
    status: pending
    quality_commands:
      format:
        status: pending
        command: TBD
        notes: []
      lint:
        status: pending
        command: TBD
        notes: []
      typecheck:
        status: pending
        command: TBD
        notes: []
      unit:
        status: pending
        command: TBD
        notes: []
    artifacts_to_specialize:
      - artifact: harness/capability-profile.yaml
        driven_by: stack_selection.harness_artifacts.capability_activations
        status: pending
      - artifact: harness/oracles.yaml
        driven_by: stack_selection.harness_artifacts.oracle_packs_activated
        status: pending
      - artifact_group: stack_selection.harness_artifacts.projections_required
        status: pending
    notes: []
  status_guidance:
    allowed_values:
      pending: Not yet started.
      in_progress: Actively being filled in; required fields may remain TBD.
      complete: Required fields are filled and internally consistent.
      blocked: Waiting on external input; add a note to explain the blocker.
    completion_guidance:
      intake:
        starts_when: Any target_project field changes from TBD.
        complete_when: domain, users, constraints, and delivery_shape are all non-TBD.
      research:
        starts_when: intake.status == complete.
        complete_when: At least one finding and one source are recorded.
      stack_selection:
        starts_when: research.status == complete.
        complete_when: selected fields are non-TBD and alternatives_considered is non-empty.
      harness_application:
        starts_when: stack_selection.status == complete.
        complete_when: Every quality_commands entry and artifacts_to_specialize entry has status == complete.

template_workflow:
  summary: >-
    Apply the harness after understanding the target project rather than before.
  steps:
    - Capture the target project's domain, users, constraints, and delivery shape in `specialization_record.intake`.
    - Record research questions and findings in `specialization_record.research`.
    - Record stack selection in `specialization_record.stack_selection` before changing workflow artifacts.
    - Adapt kernel-owned workflow artifacts after the manifest's specialization record is coherent.
    - Emit vendor-facing adapters only after the kernel side is coherent.

rollout:
  current_step: foundation-template-and-harness-scaffolding
  next_steps:
    - Strengthen project-intake and stack-selection guidance for template users.
    - Replace planned core oracle commands after stack selection is complete.
    - Expand compatibility matrix coverage carefully.
    - Keep generated leaf adapters aligned with their projection specs.
    - Use symlinked adapters only where source-of-truth boundaries stay clear.
    - Introduce runtime helpers only after a documented gap is demonstrated.
