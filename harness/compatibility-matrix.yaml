version: 0.1
status: draft
coverage: partial
reviewed_at: 2026-03-14
status_semantics:
  native: Documented first-class or analogous surface exists for this vendor.
  emulated: Repo-side projection or helper would be required.
  unsupported: Reviewed and not currently represented in the checked sources.
matrix_scope: >-
  This matrix describes reviewed vendor capability surfaces. It does not imply
  that this repository already emits or implements every corresponding adapter.
missing_policy: >-
  Missing capability entries are not yet reviewed and must not be treated as
  unsupported.

kernel_vocabulary:
  - instructions
  - plans
  - skills
  - hooks
  - subagents
  - mcp_tools
  - approvals
  - sandbox
  - traces
  - background_jobs
  - review
  - oracles

vendors:
  openai-codex:
    support:
      instructions:
        status: native
        evidence:
          - https://developers.openai.com/codex/guides/agents-md/
        notes: Layered AGENTS.md discovery is documented.
      plans:
        status: native
        evidence:
          - https://developers.openai.com/cookbook/articles/codex_exec_plans/
          - https://developers.openai.com/codex/learn/best-practices/
        notes: PLANS.md and execution-plan workflows are documented.
      skills:
        status: native
        evidence:
          - https://developers.openai.com/codex/learn/best-practices/
        notes: Skills are documented as reusable workflow capsules.
      mcp_tools:
        status: native
        evidence:
          - https://developers.openai.com/codex/learn/best-practices/
        notes: MCP is documented as the preferred path for external context.

  anthropic-claude-code:
    support:
      instructions:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/settings
        notes: CLAUDE.md and project/user settings scopes are documented.
      hooks:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/hooks
        notes: Multiple lifecycle hooks, blocking behavior, and scoped hook files are documented.
      subagents:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/subagents
        notes: Built-in and custom subagents are documented.
      mcp_tools:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/settings
          - https://docs.anthropic.com/en/docs/claude-code/subagents
        notes: MCP server configuration exists in settings and subagent definitions.
      approvals:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/settings
          - https://docs.anthropic.com/en/docs/claude-code/hooks
        notes: Permission modes and permission hooks are documented.
      sandbox:
        status: native
        evidence:
          - https://docs.anthropic.com/en/docs/claude-code/settings
        notes: Bash sandbox settings and filesystem/network controls are documented.

  cursor:
    support:
      instructions:
        status: native
        evidence:
          - https://cursor.com/blog/agent-best-practices
        notes: Rules are documented as persistent project instructions.
      plans:
        status: native
        evidence:
          - https://cursor.com/blog/agent-best-practices
        notes: Plan Mode and `.cursor/plans/` are documented.
      skills:
        status: native
        evidence:
          - https://cursor.com/blog/agent-best-practices
          - https://cursor.com/blog/dynamic-context-discovery
        notes: Skills are documented as dynamically loaded capabilities.
      hooks:
        status: native
        evidence:
          - https://cursor.com/blog/agent-best-practices
          - https://cursor.com/blog/hooks-partners
        notes: Hooks are documented as a way to observe, control, and extend the loop.
      mcp_tools:
        status: native
        evidence:
          - https://cursor.com/blog/dynamic-context-discovery
          - https://cursor.com/blog/agent-best-practices
        notes: MCP is documented as a first-class integration surface.

  github-copilot-coding-agent:
    support:
      instructions:
        status: native
        evidence:
          - https://docs.github.com/enterprise-cloud@latest/copilot/tutorials/coding-agent/get-the-best-results
          - https://github.blog/changelog/2025-08-28-copilot-coding-agent-now-supports-agents-md-custom-instructions/
        notes: Repository custom instruction surfaces are documented, including AGENTS.md support and GitHub instruction file formats.
      skills:
        status: native
        evidence:
          - https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/create-skills
        notes: Agent skills are documented as repository or personal skill folders loaded when relevant.
      hooks:
        status: native
        evidence:
          - https://docs.github.com/en/copilot/concepts/agents/coding-agent/about-hooks
        notes: Coding agent hooks are documented as repository JSON configurations that run at key lifecycle points.
      subagents:
        status: emulated
        evidence:
          - https://docs.github.com/en/copilot/concepts/agents/coding-agent/about-custom-agents
        notes: Custom agents provide a nearby role-specialized surface, but repo-side conventions would still be needed to model kernel subagent handoff.
      mcp_tools:
        status: native
        evidence:
          - https://docs.github.com/en/copilot/concepts/agents/coding-agent/mcp-and-coding-agent
          - https://docs.github.com/enterprise-cloud@latest/copilot/tutorials/coding-agent/get-the-best-results
        notes: Coding agent can use MCP tools from default, repository, and custom-agent MCP server configurations.
      approvals:
        status: native
        evidence:
          - https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/configuring-agent-settings
        notes: Repository settings document approval requirements for workflow runs, providing a limited analogous approval surface for high-impact operations.
      sandbox:
        status: native
        evidence:
          - https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-firewall
        notes: Coding agent documents a configurable firewall and allowlist model that provides an analogous network-boundary control surface rather than a general-purpose sandbox.
