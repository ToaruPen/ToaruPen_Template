version: 0.1
status: draft

durable_sources:
  - path: README.md
    role: Repository overview, template intent, and current scope snapshot.
    status: active

  - path: DESIGN.md
    role: Design rationale, scope boundaries, and rollout order.
    status: active

  - path: harness/manifest.yaml
    role: Committed specialization record for project intake, stack selection, workflow order, and repository scope.
    status: active

  - path: harness/capability-profile.yaml
    role: Initial capability instance for this repository.
    status: active

  - path: harness/policy.yaml
    role: Policy intent, approval boundaries, and change limits.
    status: active

  - path: harness/review.yaml
    role: Review inputs and reviewer focus areas.
    status: draft

  - path: docs/adr/
    role: Decision log for architectural, policy, and compatibility choices.
    status: active

  - path: harness/oracles.yaml
    role: Verification packs and done conditions.
    status: draft

  - path: harness/rules.yaml
    role: Proposed structural and lint-oriented rules.
    status: draft

  - path: harness/compatibility-matrix.yaml
    role: Partial vendor capability coverage backed by checked sources.
    status: partial

  - path: harness/projections/openai-agents.yaml
    role: Projection contract for the OpenAI-facing AGENTS.md leaf adapter.
    status: draft

  - path: harness/projections/anthropic-claude.yaml
    role: Projection contract for the Anthropic-facing CLAUDE.md symlink adapter.
    status: draft

  - path: scripts/check_projection_sync.rb
    role: Verification script for emitted and symlinked adapter alignment.
    status: active

  - path: scripts/check_compatibility_matrix.rb
    role: Verification script for compatibility matrix coverage summaries.
    status: active

  - path: scripts/check_adr.rb
    role: Verification script for ADR structure and presence.
    status: active

  - path: scripts/check_rules.rb
    role: Verification script for rules metadata structure.
    status: active

  - path: scripts/check_oracles_ready.rb
    role: Verification script for project-specific core quality command readiness.
    status: active

lookup_order:
  - Start with `README.md` for template intent, repository status, and near-term usage.
  - Read `specialization_record` in `harness/manifest.yaml` to understand what has already been captured and decided.
  - Read `DESIGN.md` for deeper rationale and rollout sequencing.
  - Use `harness/manifest.yaml` and `harness/capability-profile.yaml` to understand the recorded specialization state and current kernel scope.
  - Check `harness/policy.yaml`, `harness/review.yaml`, and `harness/oracles.yaml` before proposing workflow changes.
  - Consult `harness/compatibility-matrix.yaml` before claiming vendor support.
  - Consult projection specs before editing vendor-facing files.
  - Treat `AGENTS.md` as the canonical shared leaf adapter when compatible symlinks are in use.
  - Run `scripts/check_projection_sync.rb` after changing projection specs or adapter files.
  - Run `scripts/check_adr.rb`, `scripts/check_rules.rb`, and `scripts/check_oracles_ready.rb` when changing ADR, rules, or oracle-readiness metadata.

runtime_artifacts:
  - path: reports/projection-sync.json
    role: Latest runtime report for projection realization checks and input hash snapshots.
    status: generated
    usage: Inspect after running `scripts/check_projection_sync.rb`; do not treat as authoritative source.

  - path: reports/compatibility-matrix.json
    role: Latest runtime report for reviewed-cell coverage and per-vendor unreviewed capability lists.
    status: generated
    usage: Inspect after running `scripts/check_compatibility_matrix.rb`; do not treat as authoritative source.

  - path: reports/adr-check.json
    role: Latest runtime report for ADR structure validation.
    status: generated
    usage: Inspect after running `scripts/check_adr.rb`; do not treat as authoritative source.

  - path: reports/rules-check.json
    role: Latest runtime report for rules metadata validation.
    status: generated
    usage: Inspect after running `scripts/check_rules.rb`; do not treat as authoritative source.

  - path: reports/oracles-readiness.json
    role: Latest runtime report for project-specific code quality command readiness.
    status: generated
    usage: Inspect after running `scripts/check_oracles_ready.rb`; do not treat as authoritative source.

reference_artifacts:
  - path: harness/examples/manifest-specialization.example.yaml
    role: Filled-in reference example for specialization_record; not a committed project decision.
    status: reference

notes:
  - Missing entries are absent, not implicitly unsupported.
  - Vendor-facing files should reference these sources instead of duplicating them.
